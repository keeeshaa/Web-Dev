<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook - log in or sign up</title>
    <link rel="stylesheet" href="facebook.css">
</head>
<body>
<div>
    <div>
        <div class="text">
            <div class="logo-img">
                <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lCu2zih0ca.svg" alt="Facebook Logo">
            </div>
            <div>
                <h2>Connect with friends and the world around you on Facebook.</h2>
            </div>
        </div>
        <div class="form">
            <form action="">
                <div class="input-area">
                    <input type="text" class="user-input" name="email" id="email" placeholder="Email or phone number">
                </div>
                <div class="input-area">
                    <input type="password" class="user-input" name="pass" id="pass" placeholder="Password">
                </div>
                <button name="login" type="submit">Log In</button>
                <a href="https://www.facebook.com/recover/initiate/
                ?privacy_mutation_token=eyJ0eXBlIjowLCJjcmVhdGlvbl90aW1lIjoxNz
                M4NDMyNDY3LCJjYWxsc2l0ZV9pZCI6MzgxMjI5MDc5NTc1OTQ
                2fQ%3D%3D&ars=facebook_login&next">Forgot your password?</a>
                <a role="button" href="https://www.facebook.com/r.php?entry_point=login">Create new account</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
